<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATIVIDADE 10    </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
<h2>formualrio de adoção</h2>

<form id="formAdocao">

<label for="nome">Nome:</label>
<input type="text" id="nome" placeholder="Digite seu nome">
<br>

<label for="email">Email:</label>
<input type="text" id="email" placeholder="Digite seu email:">
<br>

<label for="cpf">cpf</label>
<input type="text" id="cpf" placeholder="Digite seu cpf:">
<br>

<label for="telefone">telefone</label>
<input type="text" id="telefone" placeholder="Digite seu Telefone:">
<br>

<label for="moradia">Moradia:</label>
<select name="moradia" id="moradia">
<option value="">Selecione</option>
<option value="casa">Casa</option>
<option value="apartamento">Apartamento</option>
</select>
<br>

<label for="quintal">Possui Quintal?</label>
<input type="radio" name="quintal" value="sim">sim
<input type="radio" name="quintal" value="nao">Não
<br>

<label for="quintal">Já teve Pet antes?</label>
<input type="radio" name="pet" value="sim">sim
<input type="radio" name="pet" value="nao">Não
<br>

<label for="quintal">Quantas horas o animal ficara sózinho?</label>
<input type="radio" name="horas" value="4">4 horas
<input type="radio" name="horas" value="6">6 horas
<input type="radio" name="horas" value="6">8 horas ou mais
<br>



<label for="nome">Motivo da adoção?</label>
<input type="text" id="adc" placeholder="Digite seu motivo:">
<br>











<button type="submit">Enviar</button>

</form>

<div id="resultado"></div>
<script src="ongs.js"></script>






</body>
</html>
